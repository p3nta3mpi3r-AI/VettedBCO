<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.body.innerHTML += '<div style="position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:10px;">GLOBAL ERROR: ' + message + '</div>';
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML += '<div style="position:fixed;top:40px;left:0;z-index:9999;background:orange;color:white;padding:10px;">PROMISE ERROR: ' + event.reason + '</div>';
      });
      const originalConsoleError = console.error;
      console.error = function(...args) {
        document.body.innerHTML += '<div style="position:fixed;top:80px;left:0;z-index:9999;background:darkred;color:white;padding:10px;">CONSOLE ERROR: ' + args.join(' ') + '</div>';
        originalConsoleError.apply(console, args);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
